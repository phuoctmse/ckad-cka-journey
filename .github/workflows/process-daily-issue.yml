name: 🤖 Process Daily Report Comment

on:
  issue_comment:
    types: [created]

jobs:
  generate-markdown:
    # Chỉ chạy pipeline nếu comment không phải của bot và chứa từ khoá nhận diện báo cáo
    if: false == contains(github.event.comment.user.login, 'bot') && contains(github.event.comment.body, 'Thời gian học')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tạo/Cập nhật file Markdown từ Comment
        id: create_file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Sinh tên file dựa trên ngày hiện tại
          DATE=$(date +"%Y-%m-%d")
          mkdir -p daily-logs
          
          # Đặt tên file log có chứa số Issue để tránh trùng lặp nếu 1 ngày làm nhiều task
          FILE="daily-logs/${DATE}-issue-${{ github.event.issue.number }}.md"
          
          # Đổ dữ liệu từ comment vào file Markdown
          # Escape square brackets in the issue title to avoid markdown reference link warnings (MD052)
          SAFE_TITLE=$(printf '%s' "$ISSUE_TITLE" | sed 's/\[/\\\[/g; s/\]/\\\]/g')
          echo "# Báo cáo task: $SAFE_TITLE" > "$FILE"
          echo "" >> "$FILE"
          echo "$COMMENT_BODY" >> "$FILE"
          
          # Xuất đường dẫn file để dùng ở step sau
          echo "file_path=$FILE" >> $GITHUB_OUTPUT

      - name: Commit và Push code vào repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-logs/ || true

          # Nếu không có thay đổi đã staged, bỏ qua commit để tránh lỗi 'nothing to commit'
          if git diff --cached --quiet; then
            echo "⚠️  Không có thay đổi để commit. Bỏ qua bước commit/push."
          else
            git commit -m "docs(report): tự động lưu báo cáo ngày ${{ steps.create_file.outputs.file_path }} (Từ comment Issue #${{ github.event.issue.number }})"
            git push
          fi

      - name: AI Mentor & Bot Comment
        uses: actions/github-script@v7
        with:
          script: |
            const filePath = process.env.FILE_PATH;
            const commentBody = process.env.COMMENT_BODY;
            const apiKey = process.env.GEMINI_API_KEY;
            
            let aiMentorMessage = "_(Chưa cấu hình AI Mentor. Để nhận lời khuyên tự động, hãy thêm biến \`GEMINI_API_KEY\` vào GitHub Repository Secrets)_";
            
            if (apiKey) {
              try {
                // Gọi API của Google Gemini để nhận phản hồi từ AI Mentor
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    systemInstruction: {
                      parts: [{ text: 'Bạn là một DevOps Senior, chuyên gia Kubernetes (CKA/CKAD) và là Mentor tâm huyết. Hãy đóng vai trò accountability partner của học sinh (Phuoc). Nhiệm vụ của bạn khi đọc report là: 1) Nhận xét nhanh những gì học sinh hiểu đúng/còn mơ hồ. 2) Đặt 1-2 câu hỏi kiểm tra liên quan format đề thi CKA/CKAD thực tế. 3) Gợi ý cụ thể cho buổi sau. 4) CẢNH BÁO nếu sai lệch so với đề thi CKA/CKAD 2026 (lưu ý đề đã thêm Helm, Kustomize, Gateway API, CRDs, Operators, Dynamic Storage Provisioning). 5) Đưa ra 3 câu hỏi Flashcard nhanh. Phải trả lời bằng tiếng Việt, nhận xét thẳng thắn, không khen chung chung, định dạng Markdown.' }]
                    },
                    contents: [{
                      parts: [{ text: commentBody }]
                    }]
                  })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                  aiMentorMessage = data.candidates[0].content.parts[0].text;
                }
              } catch (error) {
                console.log("Error calling Gemini API:", error);
                aiMentorMessage = "_(Có lỗi xảy ra khi kết nối tới AI Mentor)_";
              }
            }
            
            // 1. Bot trả lời lại Issue kèm lời khuyên của AI
            const finalComment = `✅ **Hệ thống đã lưu lại báo cáo** vào file \`${filePath}\`.\n\n---\n\n### 🧙‍♂️ Đánh giá từ AI Mentor:\n\n${aiMentorMessage}\n\n---\n\n*Học sinh Phước cố lên! Đừng quên đóng Issue này lại nếu bạn đã hoàn thành xong tác vụ.*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: finalComment
            });
        env:
          FILE_PATH: ${{ steps.create_file.outputs.file_path }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

      - name: Debug: check GEMINI_API_KEY presence
        if: always()
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️ GEMINI_API_KEY is EMPTY"
            exit 0
          else
            echo "✅ GEMINI_API_KEY is present (value hidden)"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
