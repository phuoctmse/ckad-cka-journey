name: 🤖 Process Daily Report Comment

on:
  issue_comment:
    types: [created]

jobs:
  generate-markdown:
    # Chỉ chạy pipeline nếu comment không phải của bot và chứa từ khoá nhận diện báo cáo
    if: false == contains(github.event.comment.user.login, 'bot') && contains(github.event.comment.body, 'Thời gian học')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tạo/Cập nhật file Markdown từ Comment
        id: create_file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          # Sinh tên file dựa trên ngày hiện tại
          DATE=$(date +"%Y-%m-%d")
          mkdir -p daily-logs

          # Đặt tên file log có chứa số Issue để tránh trùng lặp nếu 1 ngày làm nhiều task
          FILE="daily-logs/${DATE}-issue-${{ github.event.issue.number }}.md"

          # Đổ dữ liệu từ comment vào file Markdown
          # Escape square brackets in the issue title to avoid markdown reference link warnings (MD052)
          SAFE_TITLE=$(printf '%s' "$ISSUE_TITLE" | sed 's/\[/\\\[/g; s/\]/\\\]/g')
          echo "# Báo cáo task: $SAFE_TITLE" > "$FILE"
          echo "" >> "$FILE"
          echo "$COMMENT_BODY" >> "$FILE"

          # Xuất đường dẫn file để dùng ở step sau
          echo "file_path=$FILE" >> $GITHUB_OUTPUT

      - name: Commit và Push code vào repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-logs/ || true

          # Nếu không có thay đổi đã staged, bỏ qua commit để tránh lỗi 'nothing to commit'
          if git diff --cached --quiet; then
            echo "⚠️  Không có thay đổi để commit. Bỏ qua bước commit/push."
          else
            git commit -m "docs(report): tự động lưu báo cáo ngày ${{ steps.create_file.outputs.file_path }} (Từ comment Issue #${{ github.event.issue.number }})"
            git push
          fi

      - name: AI Mentor & Bot Comment
        uses: actions/github-script@v7
        with:
          script: |
            const filePath = process.env.FILE_PATH;
            const commentBody = process.env.COMMENT_BODY;
            const apiKey = process.env.GEMINI_API_KEY;

            let aiMentorMessage = "_(Chưa cấu hình AI Mentor. Để nhận lời khuyên tự động, hãy thêm biến \`GEMINI_API_KEY\` vào GitHub Repository Secrets)_";

            if (apiKey) {
              try {
                // Gọi API của Google Gemini để nhận phản hồi từ AI Mentor
                const model = process.env.GEMINI_MODEL || 'gemini-2.5-flash';
                console.log('Using Gemini model:', model);
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
                const response = await fetch(endpoint, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                  systemInstruction: {
                    parts: [{ text: 'Bạn là **Senior DevOps Engineer kiêm Mentor** chuyên Kubernetes, đang đồng hành cùng học viên tên **Phuoc** (fresher DevOps/Cloud tại HCMC, có background Docker thực tế qua project Food Fund & RunGuard, AWS CCP certified, AWS SAA certified, Terraform cơ bản, K8s đang học). Mục tiêu: thi CKAD trước → CKA sau trong 14 tuần, dùng Udemy KodeKloud + LabEx.io.\n\n⚠️ ĐỀ THI 2026 (post Feb 2025 — BẮT BUỘC NẮM): Helm + Kustomize + Gateway API (GatewayClass/Gateway/HTTPRoute) + CRDs + Operators + Dynamic Storage Provisioning + CNI/CSI/CRI chiếm ~50% đề CKA. Troubleshooting chiếm 30% — topic lớn nhất. K8s version v1.34–v1.35. Pass score 66%. Exam là performance-based terminal, không multiple choice — tốc độ kubectl quyết định. Các guide trước Feb 2025 KHÔNG CÒN ĐỦ.\n\nKhi nhận report từ học viên, PHẢI phản hồi đúng 5 mục theo thứ tự sau, dùng Markdown tiếng Việt, thuật ngữ kỹ thuật giữ tiếng Anh:\n\n### ✅ NHẬN XÉT NHANH\nĐánh giá cụ thể từng điểm đúng/sai/thiếu dựa trên nội dung report. TUYỆT ĐỐI KHÔNG khen chung chung kiểu "bạn đã làm tốt" — phải chỉ ra đúng chỗ hiểu sai hoặc còn mơ hồ.\n\n### ⚠️ CẢNH BÁO\nNếu học viên học sai hướng, bỏ sót topic quan trọng của đề 2026, hoặc dành quá nhiều thời gian vào topic ít điểm — cảnh báo thẳng thắn. Nếu không có vấn đề, ghi "Không có cảnh báo." và bỏ qua.\n\n### ❓ KIỂM TRA NHANH\nĐặt đúng 1–2 câu hỏi dạng imperative task như đề thi thực tế (KHÔNG hỏi lý thuyết). Ví dụ tốt: "Tạo Pod tên nginx-pod dùng image nginx:1.25, mount ConfigMap tên app-config vào /etc/config. Viết lệnh kubectl hoặc YAML." Ví dụ kém (tránh): "Bạn hiểu ConfigMap là gì không?"\n\n### 🗓️ GỢI Ý BUỔI TIẾP THEO\n2–3 việc cụ thể cần làm trong buổi học tiếp theo dựa trên điểm yếu học viên tự khai. Ưu tiên topic ⚠️ nếu sắp học đến. Không gợi ý chung chung.\n\n### 🃏 FLASHCARD (đúng 3 câu)\nFormat bắt buộc:\n**Q1:** [câu hỏi ngắn]\n<details><summary>Xem đáp án</summary>[đáp án ngắn]</details>\n**Q2:** [câu hỏi ngắn]\n<details><summary>Xem đáp án</summary>[đáp án ngắn]</details>\n**Q3:** [câu hỏi ngắn]\n<details><summary>Xem đáp án</summary>[đáp án ngắn]</details>\n\nNGUYÊN TẮC: Thẳng thắn hơn dễ chịu. Bám sát đề 2026. Ưu tiên theo trọng số điểm (Troubleshooting 30% > các topic khác). Không hỏi ngược quá 2 câu. Nếu học viên bỏ ngày học — nhắc ngắn gọn, không thuyết giáo.' }]
                    },
                    contents: [{
                      parts: [{ text: commentBody }]
                    }]
                  })
                });

                // Log HTTP status and first chunk of body to help debugging (no secret printed)
                console.log('Gemini API status:', response.status);
                const rawText = await response.text();
                console.log('Gemini API body (truncated):', rawText.substring(0, 2000));

                // Try to parse JSON safely
                let data = null;
                try { data = JSON.parse(rawText); } catch (e) { /* not JSON */ }

                if (data && data.candidates && data.candidates[0] && data.candidates[0].content) {
                  aiMentorMessage = data.candidates[0].content.parts[0].text;
                } else if (!response.ok) {
                  aiMentorMessage = `_(Gemini API returned status ${response.status})_`;
                } else if (!data) {
                  aiMentorMessage = "_(Gemini API returned non-JSON response)_";
                }
              } catch (error) {
                console.log("Error calling Gemini API:", error);
                aiMentorMessage = "_(Có lỗi xảy ra khi kết nối tới AI Mentor)_";
              }
            }

            // 1. Bot trả lời lại Issue kèm lời khuyên của AI
            const finalComment = `✅ **Hệ thống đã lưu lại báo cáo** vào file \`${filePath}\`.\n\n---\n\n### 🧙‍♂️ Đánh giá từ AI Mentor:\n\n${aiMentorMessage}\n\n---\n\n*Học sinh Phước cố lên! Đừng quên đóng Issue này lại nếu bạn đã hoàn thành xong tác vụ.*`;

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: finalComment
            });
        env:
          FILE_PATH: ${{ steps.create_file.outputs.file_path }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}

      - name: check GEMINI_API_KEY presence
        if: always()
        run: |
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "⚠️ GEMINI_API_KEY is EMPTY"
            exit 0
          else
            echo "✅ GEMINI_API_KEY is present (value hidden)"
          fi
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
