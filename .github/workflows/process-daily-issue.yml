name: 🤖 Process Daily Report Issue

on:
  issues:
    types: [opened]

jobs:
  generate-markdown:
    # Chỉ chạy pipeline này nếu Issue được gắn nhãn 'daily-report'
    if: contains(github.event.issue.labels.*.name, 'daily-report')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Tạo file Markdown từ Issue
        id: create_file
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          # Sinh tên file dựa trên ngày hiện tại
          DATE=$(date +"%Y-%m-%d")
          mkdir -p daily-logs
          FILE="daily-logs/$DATE.md"
          
          # Đổ dữ liệu từ Issue form vào file Markdown
          echo "# $ISSUE_TITLE" > "$FILE"
          echo "" >> "$FILE"
          echo "$ISSUE_BODY" >> "$FILE"
          
          # Xuất đường dẫn file để dùng ở step sau
          echo "file_path=$FILE" >> $GITHUB_OUTPUT

      - name: Commit và Push code vào repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-logs/
          git commit -m "docs(report): tự động thêm báo cáo ngày ${{ steps.create_file.outputs.file_path }} (Từ Issue #${{ github.event.issue.number }})"
          git push

      - name: AI Mentor & Bot Comment
        uses: actions/github-script@v7
        with:
          script: |
            const filePath = process.env.FILE_PATH;
            const issueBody = process.env.ISSUE_BODY;
            const apiKey = process.env.GEMINI_API_KEY;
            
            let aiMentorMessage = "_(Chưa cấu hình AI Mentor. Để nhận lời khuyên tự động, hãy thêm biến \`GEMINI_API_KEY\` vào GitHub Repository Secrets)_";
            
            if (apiKey) {
              try {
                // Gọi API của Google Gemini để nhận phản hồi từ AI Mentor
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                  method: 'POST',
                  headers: {
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({
                    systemInstruction: {
                      parts: [{ text: 'Bạn là một DevOps Senior, chuyên gia Kubernetes (CKA/CKAD) và là Mentor tâm huyết. Hãy đóng vai trò accountability partner của học sinh (Phuoc). Nhiệm vụ của bạn khi đọc report là: 1) Nhận xét nhanh những gì học sinh hiểu đúng/còn mơ hồ. 2) Đặt 1-2 câu hỏi kiểm tra liên quan format đề thi CKA/CKAD thực tế. 3) Gợi ý cụ thể cho buổi sau. 4) CẢNH BÁO nếu sai lệch so với đề thi CKA/CKAD 2026 (lưu ý đề đã thêm Helm, Kustomize, Gateway API, CRDs, Operators, Dynamic Storage Provisioning). 5) Đưa ra 3 câu hỏi Flashcard nhanh. Phải trả lời bằng tiếng Việt, nhận xét thẳng thắn, không khen chung chung, định dạng Markdown.' }]
                    },
                    contents: [{
                      parts: [{ text: issueBody }]
                    }]
                  })
                });
                
                const data = await response.json();
                if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                  aiMentorMessage = data.candidates[0].content.parts[0].text;
                }
              } catch (error) {
                console.log("Error calling Gemini API:", error);
                aiMentorMessage = "_(Có lỗi xảy ra khi kết nối tới AI Mentor)_";
              }
            }
            
            // 1. Bot trả lời lại Issue kèm lời khuyên của AI
            const finalComment = `✅ **GitHub Actions Bot:** Cảm ơn bạn! Báo cáo hôm nay đã được lưu tự động vào file \`${filePath}\`.\n\n---\n\n### 🧙‍♂️ Đánh giá từ AI Mentor:\n\n${aiMentorMessage}\n\n---\n\n*Tôi sẽ đóng Issue này lại để thẻ công việc tự động chuyển sang cột **Done** trên Kanban! 🎉*`;
            
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: finalComment
            });
            
            // 2. Tự động đóng Issue
            await github.rest.issues.update({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'closed'
            });
        env:
          FILE_PATH: ${{ steps.create_file.outputs.file_path }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
